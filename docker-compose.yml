services:
  # Proyecto Pluto: Bóveda de Datos Principal
  pluto:
    image: postgres:15-alpine
    container_name: pluto_db
    environment:
      POSTGRES_USER: zeni_admin
      POSTGRES_PASSWORD: zeni_password
      POSTGRES_DB: zeni_db
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pluto_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - zeni_network

  redis:
    image: redis:7-alpine
    container_name: zeni_redis
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zeni_network

  # Proyecto Atenea: API Gateway y Lógica de Negocio
  atenea:
    build:
      context: ./atenea
      target: runtime
    container_name: atenea_api
    ports:
      - "3000:3000"
    env_file:
      - path: ./atenea/.env.example
        required: true
      - path: ./atenea/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://zeni_admin:zeni_password@pluto:5432/zeni_db?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      atenea-migrate:
        condition: service_completed_successfully
      pluto:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(response => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - zeni_network

  atenea-migrate:
    build:
      context: ./atenea
      target: migrate
    env_file:
      - path: ./atenea/.env.example
        required: true
      - path: ./atenea/.env
        required: false
    environment:
      DATABASE_URL: postgresql://zeni_admin:zeni_password@pluto:5432/zeni_db?schema=public
    depends_on:
      pluto:
        condition: service_healthy
    restart: "no"
    networks:
      - zeni_network

  # Proyecto Atlas: Motor de Alto Rendimiento
  atlas:
    build:
      context: ./atlas
      target: runtime
    container_name: atlas_worker
    networks:
      - zeni_network

volumes:
  pluto_data:
  redis_data:

networks:
  zeni_network:
    driver: bridge
