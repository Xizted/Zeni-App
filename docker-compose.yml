services:
  # Proyecto Pluto: Bóveda de Datos Principal
  pluto:
    image: postgres:15-alpine
    container_name: pluto_db
    environment:
      POSTGRES_USER: zeni_admin
      POSTGRES_PASSWORD: zeni_password
      POSTGRES_DB: zeni_db
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pluto_data:/var/lib/postgresql/data
    networks:
      - zeni_network

  redis:
    image: redis:7-alpine
    container_name: zeni_redis
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zeni_network

  # Proyecto Atenea: API Gateway y Lógica de Negocio
  atenea:
    build:
      context: ./atenea
      # Aquí asumiremos un Dockerfile estándar de NestJS
    container_name: atenea_api
    ports:
      - "3000:3000"
    env_file:
      - ./atenea/.env
    environment:
      - DATABASE_URL=postgresql://zeni_admin:zeni_password@pluto:5432/zeni_db?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      - pluto
      - redis
    networks:
      - zeni_network

  # Proyecto Atlas: Motor de Alto Rendimiento
  atlas:
    build:
      context: ./atlas
      # Aquí asumiremos un Dockerfile estándar de Go
    container_name: atlas_worker
    ports:
      - "50051:50051" # Puerto típico para gRPC
    depends_on:
      - pluto
    networks:
      - zeni_network

volumes:
  pluto_data:
  redis_data:

networks:
  zeni_network:
    driver: bridge
